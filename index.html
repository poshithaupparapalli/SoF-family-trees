<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scholar of finance — family tree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1F3C;
  --navy2: #1B3A6B;
  --navy3: #2B5499;
  --navy4: #3A6EBF;
  --navy5: #6B9ACC;
  --ink: #1a1a1a;
  --muted: #999;
  --border: #e8e8e8;
  --white: #ffffff;
}
html, body { height: 100%; background: var(--white); color: var(--ink); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* ─── INTRO ─── */
#intro {
  position: fixed; inset: 0; background: var(--white);
  z-index: 999; display: flex; align-items: center; justify-content: center;
  transition: opacity 1s ease;
}
#intro.fade { opacity: 0; pointer-events: none; }

.intro-inner { text-align: center; }

.typed-line {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 300;
  color: var(--ink);
  letter-spacing: 0.01em;
  min-height: 1.4em;
  display: flex; align-items: center; justify-content: center;
}
.cursor {
  display: inline-block;
  width: 1px; height: 1em;
  background: var(--ink);
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
  vertical-align: middle;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ─── MAIN ─── */
#main { opacity: 0; transition: opacity 0.8s ease; }
#main.show { opacity: 1; }

/* ─── NAV ─── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 48px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px);
}
.nav-logo {
  font-size: 0.88rem; font-weight: 400; color: var(--ink);
  letter-spacing: 0.01em;
}
.nav-logo span { color: var(--navy3); }
.nav-right {
  display: flex; align-items: center; gap: 24px;
}
.nav-search {
  position: relative;
}
.nav-search input {
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 300;
  color: var(--ink); background: none; border: none; border-bottom: 1px solid var(--border);
  padding: 4px 0 4px 0; outline: none; width: 160px;
  transition: border-color 0.2s;
}
.nav-search input::placeholder { color: var(--muted); }
.nav-search input:focus { border-color: var(--navy3); }
.gen-filters { display: flex; gap: 16px; }
.gf {
  font-size: 0.75rem; font-weight: 300; color: var(--muted);
  cursor: pointer; background: none; border: none;
  font-family: 'DM Sans', sans-serif;
  transition: color 0.15s; padding: 0;
  letter-spacing: 0.02em;
}
.gf:hover { color: var(--ink); }
.gf.active { color: var(--navy); font-weight: 500; }
.replay {
  font-size: 0.75rem; font-weight: 300; color: var(--muted);
  cursor: pointer; background: none; border: none;
  font-family: 'DM Sans', sans-serif;
  transition: color 0.15s;
}
.replay:hover { color: var(--ink); }

/* ─── STATS ROW ─── */
.stats {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 48px;
}
.stat {
  padding: 14px 32px 14px 0; margin-right: 32px;
  border-right: 1px solid var(--border);
}
.stat:last-child { border-right: none; }
.stat-n { font-size: 1.3rem; font-weight: 300; color: var(--navy); }
.stat-l { font-size: 0.68rem; color: var(--muted); margin-top: 1px; letter-spacing: 0.06em; text-transform: lowercase; }

/* ─── TREE ─── */
#treeWrap {
  overflow: auto; padding: 52px 48px 100px;
  cursor: default;
}
#treeInner { position: relative; display: inline-block; min-width: 100%; }
svg#lsvg { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:visible; }

/* ─── FOUNDER ROW ─── */
.founder-row {
  display: flex; align-items: flex-start;
  margin-bottom: 56px; gap: 0;
}

/* ─── FOUNDER NODE ─── */
.founder-node {
  flex-shrink: 0; width: 140px;
  cursor: pointer;
}
.founder-card {
  padding: 0; opacity: 0; transform: translateY(6px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.founder-card.pop { opacity: 1; transform: translateY(0); }
.f-name {
  font-size: 0.88rem; font-weight: 500; color: var(--navy);
  line-height: 1.3;
}
.f-label {
  font-size: 0.68rem; color: var(--muted); margin-top: 3px;
  font-weight: 300; letter-spacing: 0.05em;
}
.f-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--navy); display: inline-block;
  margin-right: 6px; vertical-align: middle; margin-bottom: 1px;
}

/* ─── GEN COLS ─── */
.gens-wrap { display: flex; gap: 28px; margin-left: 36px; align-items: flex-start; }
.gen-col { display: flex; flex-direction: column; gap: 7px; }
.gen-col[data-gen] { transition: opacity 0.2s; }

.gen-header {
  font-size: 0.62rem; color: var(--muted); font-weight: 400;
  letter-spacing: 0.1em; text-transform: lowercase; margin-bottom: 4px;
  opacity: 0; transition: opacity 0.4s ease;
  font-family: 'DM Mono', monospace;
}
.gen-header.show { opacity: 1; }

/* ─── SCHOLAR ─── */
.scholar-node { cursor: pointer; }
.scholar-card {
  padding: 5px 0;
  opacity: 0; transform: translateX(-5px);
  transition: opacity 0.35s ease, transform 0.35s ease;
  border-bottom: 1px solid transparent;
}
.scholar-card.pop { opacity: 1; transform: translateX(0); }
.scholar-card:hover { border-bottom-color: var(--navy3); }
.s-name {
  font-size: 0.78rem; font-weight: 300; color: var(--ink);
  line-height: 1.4; white-space: nowrap;
}
.s-year {
  font-size: 0.6rem; color: var(--muted); margin-top: 1px;
  font-family: 'DM Mono', monospace;
}

/* gen color dots on names */
.s-dot {
  width: 4px; height: 4px; border-radius: 50%;
  display: inline-block; margin-right: 5px;
  vertical-align: middle; margin-bottom: 1px;
}

.scholar-node.dimmed .scholar-card { opacity: 0.12; pointer-events: none; }
.scholar-node.lit .s-name { color: var(--navy); font-weight: 500; }

/* ─── SVG LINES ─── */
.tline { fill: none; stroke-width: 1; }
.tl0 { stroke: var(--navy); opacity: 0.15; }
.tl1 { stroke: var(--navy2); opacity: 0.15; }
.tl2 { stroke: var(--navy3); opacity: 0.15; }
.tl3 { stroke: var(--navy4); opacity: 0.13; }

/* ─── MODAL ─── */
.mo { position:fixed;inset:0;background:rgba(255,255,255,0.88);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px; }
.mo.open { display:flex; }
.md {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 2px; padding: 40px; max-width: 360px; width: 100%;
  box-shadow: 0 2px 40px rgba(0,0,0,0.07);
  animation: fadeUp 0.25s ease;
  position: relative;
}
.mc { position:absolute;top:16px;right:18px;background:none;border:none;font-size:1rem;cursor:pointer;color:var(--muted); transition:color 0.15s; }
.mc:hover { color:var(--ink); }
.m-name { font-size: 1.2rem; font-weight: 400; color: var(--navy); margin-bottom: 4px; }
.m-badge { font-size: 0.68rem; color: var(--muted); font-family:'DM Mono',monospace; margin-bottom: 24px; display:block; }
.m-divider { border:none;border-top:1px solid var(--border);margin:16px 0; }
.m-row { display:flex;gap:16px;margin-bottom:8px;align-items:baseline; }
.m-lbl { font-size:0.68rem;color:var(--muted);min-width:72px;letter-spacing:0.05em;text-transform:lowercase; }
.m-val { font-size:0.85rem;font-weight:300;color:var(--ink); }

.no-res { display:none;text-align:center;padding:80px 20px;color:var(--muted);font-size:0.85rem;font-weight:300; }
.no-res.show { display:block; }

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
#treeWrap::-webkit-scrollbar{width:4px;height:4px}
#treeWrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- ── INTRO ── -->
<div id="intro">
  <div class="intro-inner">
    <div class="typed-line">
      <span id="typedText"></span><span class="cursor" id="cur"></span>
    </div>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="main">
  <nav>
    <div class="nav-logo">scholar of finance <span>/ family tree</span></div>
    <div class="nav-right">
      <div class="gen-filters">
        <button class="gf active" data-gen="all">all</button>
        <button class="gf" data-gen="1">gen 1</button>
        <button class="gf" data-gen="2">gen 2</button>
        <button class="gf" data-gen="3">gen 3</button>
        <button class="gf" data-gen="4">gen 4</button>
      </div>
      <div class="nav-search">
        <input type="text" id="searchInput" placeholder="search a scholar" />
      </div>
      <button class="replay" id="replayBtn">↺ replay</button>
    </div>
  </nav>

  <div class="stats">
    <div class="stat"><div class="stat-n">5</div><div class="stat-l">founders</div></div>
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">scholars</div></div>
    <div class="stat"><div class="stat-n" id="s-g1">0</div><div class="stat-l">gen 1 '26</div></div>
    <div class="stat"><div class="stat-n" id="s-g2">0</div><div class="stat-l">gen 2 '27</div></div>
    <div class="stat"><div class="stat-n" id="s-g3">0</div><div class="stat-l">gen 3 '28</div></div>
    <div class="stat"><div class="stat-n" id="s-g4">0</div><div class="stat-l">gen 4 '29</div></div>
  </div>

  <div id="treeWrap">
    <div id="treeInner">
      <svg id="lsvg"></svg>
      <div id="treeRows"></div>
    </div>
  </div>
  <div class="no-res" id="noRes">no scholars found.</div>
</div>

<!-- ── MODAL ── -->
<div class="mo" id="mo">
  <div class="md">
    <button class="mc" id="mc">✕</button>
    <div class="m-name" id="mn"></div>
    <span class="m-badge" id="mb"></span>
    <hr class="m-divider">
    <div class="m-row"><div class="m-lbl">founder</div><div class="m-val" id="mf"></div></div>
    <div class="m-row"><div class="m-lbl">generation</div><div class="m-val" id="mg"></div></div>
    <div class="m-row"><div class="m-lbl">class year</div><div class="m-val" id="my"></div></div>
  </div>
</div>

<script>
const DATA=[
  {founder:"Anik Saluja",gen1:["Chris Gonzalez","Christina Cavin","Sammy Judge","Stewie McMillan","Victoria Cicchino"],gen2:["Chris Anderson","Krithik Rajasegar","Owen Higinbotham"],gen3:["Abha Dahal","Daniel Outkou","Gregory Yaghdjian","Josefa Pica","Randelle Agravante"],gen4:["Kyle Smith","Piper Shields","Weizi Song"]},
  {founder:"Hussain Babar",gen1:["Lucas Koranda","Marc Blekhman","Matt Silver","Owen English","Ruhi Tawde"],gen2:["Anna Seftenberg","Eli Robbins","Evan Mangifesta","Evan Ravalli","Roisin Gaffney","Vincent Jordan","Zachary Smith"],gen3:["Ben Coley","Karthik Sekhar","Nolan Keating","Sophie Lee","Tyler Fitts"],gen4:["Anshul Deval","Jack Johnsen","Keenan Roderick","Noah Moshe"]},
  {founder:"Jeffrey Davenport",gen1:["Aashir Khan","Akanksha Gavade","Andrei Empedrad","Erica Scotto Di Santolo","Leeva Slevin","Matthew Martinez"],gen2:["Edward Antczak","Juliana Diaz","Manya Sur","Meg Enquist","Zaki Khan"],gen3:["David Kyle","Gianna Grillo"],gen4:["Amy Chowdhury","Catherine Chen","Evan Bauer","Luca Netter","Michael Levy","Nicole Ng","Steven Wang","Yanet Girma"]},
  {founder:"Jordan Lickstein",gen1:["Alice Zhang","Emily Ribarich","Ingrid Weissman","Julia Spinelli","Sophia Lis","Spencer O'Connell"],gen2:["Amayah Wade","David Gallo","Jedd Frydman","Mary Highland","Paula Derengowski"],gen3:["Nate Bowers","Poshitha Reddy Upparapalli"],gen4:["Dhaashirah Coates","Nia Mathew","Suri Mon"]},
  {founder:"Muzammil Jawed",gen1:["Enzo Valadares","Sabato Corbisiero","Sofia Smith"],gen2:["Annika Flink","Dylan Alini","Grace Mawicke","John Manning","Kara Grossman","Nathan Balderas","Samuel Wertheim","Zaid Salaria"],gen3:["Azar Afellah","Christopher Chau","Grace Raney","Poshitha Upparapalli","Shirina Rong"],gen4:["Ario Merrill","Charles DeLange","Demetri Condolios","Grace Kirby","Jack Webb","Jonathan Wiggins","Josh Binder","Larah Flavier","Lucas Scourtos","Mia Chen","Natalie Percello","Simone Alexander","Sophia Disla","William Cavalier"]}
];

const GC=["#0D1F3C","#1B3A6B","#2B5499","#3A6EBF"];
const GL=["gen 1 '26","gen 2 '27","gen 3 '28","gen 4 '29"];
const GK=["gen1","gen2","gen3","gen4"];
let activeGen="all", searchVal="";

function ini(n){return n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}

// ── TYPING INTRO ──
const phrases = [
  "scholars of finance.",
  "to inspire character and integrity in the finance leaders of tomorrow.",
  "five founders. four generations.",
  "scholars of finance — family tree."
];

function typeSequence(callback) {
  const el = document.getElementById("typedText");
  const cur = document.getElementById("cur");
  let pi = 0;

  function typePhrase(phrase, done) {
    let i = 0;
    el.textContent = "";
    function typeChar() {
      if (i < phrase.length) {
        el.textContent += phrase[i++];
        setTimeout(typeChar, 42);
      } else {
        setTimeout(done, pi < phrases.length - 1 ? 700 : 400);
      }
    }
    typeChar();
  }

  function erasePhrase(done) {
    let text = el.textContent;
    function eraseChar() {
      if (text.length > 0) {
        text = text.slice(0, -1);
        el.textContent = text;
        setTimeout(eraseChar, 22);
      } else { done(); }
    }
    eraseChar();
  }

  function next() {
    if (pi < phrases.length) {
      typePhrase(phrases[pi], () => {
        pi++;
        if (pi < phrases.length) erasePhrase(next);
        else { setTimeout(() => { cur.style.display="none"; callback(); }, 600); }
      });
    }
  }
  next();
}

// ── BUILD DOM ──
function buildTree() {
  document.getElementById("treeRows").innerHTML = "";
  document.getElementById("lsvg").innerHTML = "";
  DATA.forEach((f, fi) => {
    const row = document.createElement("div");
    row.className = "founder-row";
    // founder
    const fn = document.createElement("div");
    fn.className = "founder-node";
    fn.dataset.id = `f-${fi}`;
    fn.innerHTML = `<div class="founder-card" id="fc-${fi}">
      <div class="f-name"><span class="f-dot"></span>${f.founder}</div>
      <div class="f-label">founder</div>
    </div>`;
    fn.querySelector(".founder-card").addEventListener("click", () => openModal(f.founder,"—",0));
    row.appendChild(fn);

    const gw = document.createElement("div");
    gw.className = "gens-wrap";
    GK.forEach((key, gi) => {
      const scholars = f[key] || [];
      if (!scholars.length) return;
      const col = document.createElement("div");
      col.className = "gen-col"; col.dataset.gen = String(gi+1);
      const hdr = document.createElement("div");
      hdr.className = "gen-header"; hdr.textContent = GL[gi];
      col.appendChild(hdr);
      scholars.forEach((name, ni) => {
        const sn = document.createElement("div");
        sn.className = "scholar-node";
        sn.dataset.name = name.toLowerCase(); sn.dataset.gen = String(gi+1);
        sn.dataset.id = `s-${fi}-${gi}-${ni}`;
        sn.innerHTML = `<div class="scholar-card" id="sc-${fi}-${gi}-${ni}">
          <div class="s-name"><span class="s-dot" style="background:${GC[gi]}"></span>${name}</div>
          <div class="s-year">'${26+gi}</div>
        </div>`;
        sn.querySelector(".scholar-card").addEventListener("click", () => openModal(name, f.founder, gi+1));
        col.appendChild(sn);
      });
      gw.appendChild(col);
    });
    row.appendChild(gw);
    document.getElementById("treeRows").appendChild(row);
  });
}

// ── DRAW LINES ──
function drawLines(animate=false) {
  const svg = document.getElementById("lsvg");
  const inner = document.getElementById("treeInner");
  svg.innerHTML = "";
  const ir = inner.getBoundingClientRect();
  const tc = document.getElementById("treeWrap");
  const sl = tc.scrollLeft, st = tc.scrollTop;
  const paths = [];

  DATA.forEach((f, fi) => {
    const fEl = document.querySelector(`[data-id="f-${fi}"]`);
    if (!fEl) return;
    const fc = fEl.querySelector(".founder-card").getBoundingClientRect();
    const fx = fc.right - ir.left + sl;
    const fy = fc.top + fc.height/2 - ir.top + st;

    GK.forEach((key, gi) => {
      const scholars = f[key] || [];
      scholars.forEach((_, ni) => {
        const sEl = document.querySelector(`[data-id="s-${fi}-${gi}-${ni}"]`);
        if (!sEl || sEl.classList.contains("dimmed")) return;
        const sc = sEl.querySelector(".scholar-card").getBoundingClientRect();
        const sx = sc.left - ir.left + sl;
        const sy = sc.top + sc.height/2 - ir.top + st;
        const mx = fx + (sx - fx) * 0.55;
        const path = document.createElementNS("http://www.w3.org/2000/svg","path");
        const d = `M ${fx} ${fy} C ${mx} ${fy}, ${mx} ${sy}, ${sx} ${sy}`;
        path.setAttribute("d", d);
        path.setAttribute("class", `tline tl${gi}`);
        svg.appendChild(path);
        if (animate) {
          const len = path.getTotalLength();
          path.style.strokeDasharray = len;
          path.style.strokeDashoffset = len;
          paths.push({ path, len });
        }
      });
    });
  });
  return paths;
}

// ── ANIMATE TREE ──
function animateTree() {
  // founders pop in
  DATA.forEach((_, fi) => {
    setTimeout(() => {
      const fc = document.getElementById(`fc-${fi}`);
      if (fc) fc.classList.add("pop");
    }, fi * 160);
  });

  const fDone = DATA.length * 160 + 120;

  // gen headers
  document.querySelectorAll(".gen-header").forEach((h, i) => {
    setTimeout(() => h.classList.add("show"), fDone + i * 25);
  });

  // scholars staggered by gen then founder
  const sStart = fDone + 180;
  let d = 0;
  GK.forEach((key, gi) => {
    DATA.forEach((f, fi) => {
      (f[key]||[]).forEach((_, ni) => {
        setTimeout(() => {
          const sc = document.getElementById(`sc-${fi}-${gi}-${ni}`);
          if (sc) sc.classList.add("pop");
        }, sStart + gi*100 + fi*20 + ni*18 + d);
      });
    });
  });

  const totalS = DATA.reduce((a,f)=>a+GK.reduce((b,k)=>b+(f[k]||[]).length,0),0);
  const lStart = sStart + 4*100 + totalS*10 + 300;

  // draw lines with dash animation
  setTimeout(() => {
    const paths = drawLines(true);
    paths.forEach(({path, len}, i) => {
      setTimeout(() => {
        path.style.transition = `stroke-dashoffset 0.55s cubic-bezier(0.4,0,0.2,1)`;
        path.style.strokeDashoffset = "0";
      }, i * 14);
    });
  }, lStart);
}

// ── FILTERS ──
function applyFilters() {
  let anyVis = false;
  document.querySelectorAll(".scholar-node").forEach(n => {
    const gOk = activeGen==="all" || n.dataset.gen===activeGen;
    const sOk = !searchVal || n.dataset.name.includes(searchVal);
    const show = gOk && sOk;
    n.classList.toggle("dimmed", !show);
    n.classList.toggle("lit", show && !!searchVal && sOk);
    if (show) anyVis = true;
  });
  document.querySelectorAll(".gen-col").forEach(col => {
    col.style.opacity = (activeGen==="all" || col.dataset.gen===activeGen) ? "1" : "0.15";
  });
  document.getElementById("noRes").classList.toggle("show", !anyVis && (searchVal||activeGen!=="all"));
  requestAnimationFrame(() => drawLines(false));
}

// ── MODAL ──
function openModal(name, founder, gi) {
  document.getElementById("mn").textContent = name;
  document.getElementById("mf").textContent = gi===0 ? "—" : founder;
  document.getElementById("mg").textContent = gi===0 ? "founder" : GL[gi-1];
  document.getElementById("my").textContent = gi===0 ? "—" : `class of '${25+gi}`;
  document.getElementById("mb").textContent = gi===0 ? "founder" : `${GL[gi-1]} · scholar of finance`;
  document.getElementById("mo").classList.add("open");
}
document.getElementById("mc").addEventListener("click", () => document.getElementById("mo").classList.remove("open"));
document.getElementById("mo").addEventListener("click", e => { if(e.target===document.getElementById("mo")) document.getElementById("mo").classList.remove("open"); });

// ── CONTROLS ──
document.querySelectorAll(".gf").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".gf").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); activeGen = btn.dataset.gen; applyFilters();
  });
});
document.getElementById("searchInput").addEventListener("input", e => {
  searchVal = e.target.value.toLowerCase().trim(); applyFilters();
});
document.getElementById("replayBtn").addEventListener("click", () => {
  document.querySelectorAll(".founder-card, .scholar-card").forEach(el => el.classList.remove("pop"));
  document.querySelectorAll(".gen-header").forEach(el => el.classList.remove("show"));
  document.getElementById("lsvg").innerHTML = "";
  setTimeout(animateTree, 80);
});

// ── STATS ──
function calcStats() {
  let g=[0,0,0,0];
  DATA.forEach(f => GK.forEach((k,i) => g[i]+=(f[k]||[]).length));
  document.getElementById("s-total").textContent = g.reduce((a,b)=>a+b,0);
  ["s-g1","s-g2","s-g3","s-g4"].forEach((id,i) => document.getElementById(id).textContent = g[i]);
}

// scroll redraws lines
const tw = document.getElementById("treeWrap");
tw.addEventListener("scroll", () => requestAnimationFrame(() => drawLines(false)));
window.addEventListener("resize", () => requestAnimationFrame(() => drawLines(false)));

// ── LAUNCH ──
calcStats();
buildTree();
typeSequence(() => {
  document.getElementById("intro").classList.add("fade");
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").classList.add("show");
    animateTree();
  }, 900);
});
</script>
